<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Instagram</title>
    <link rel="icon" type="image/jpg" href="/pageicon.png" />
</head>

<body class="bg-light">

    <nav class="navbar bg-white shadow-sm px-4">
        <span class="navbar-brand fw-bold">Instagram</span>
        <i class="fa-brands fa-instagram"></i>

        <div class="d-flex gap-2">
            <div class="d-flex">
                <button class="btn btn-success">Create a new post</button>
            </div>
            <!-- Dropdown -->
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                    Options
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#" onclick="setGrid(3)">3 each row</a></li>
                    <li><a class="dropdown-item" href="#" onclick="setGrid(1)">1 each row</a></li>
                </ul>
            </div>
    </nav>

    <div class="container mt-4">
        <div id="gallery" class="row g-4">

            <div class="col-md-4">
                <div class="card">
                    <div class="d-flex justify-content-between">
                    </div>
                    <img src="https://picsum.photos/600/400?1" class="card-img-top img-click" data-bs-toggle="modal"
                        data-bs-target="#imageModal">
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/600/400?2" class="card-img-top img-click" data-bs-toggle="modal"
                        data-bs-target="#imageModal">
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/600/400?3" class="card-img-top img-click" data-bs-toggle="modal"
                        data-bs-target="#imageModal">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="imageModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <img id="modalImg" class="w-100">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app.js"></script>
</html>
