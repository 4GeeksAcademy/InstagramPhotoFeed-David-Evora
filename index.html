<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Instagram</title>
    <link rel="icon" type="image/jpg" href="/pageicon.png" />
</head>

<body class="bg-light">

    <nav class="navbar bg-white shadow-sm px-4">
        <span class="navbar-brand fw-bold">
            <i class="fa fa-instagram"></i> Instagram
        </span>

        <div class="d-flex gap-2">
            <div class="d-flex">
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#PostModal">Create
                    a new post</button>
            </div>

            <div class="modal fade" id="PostModal" tabindex="-1" aria-labelledby="PostModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="PostModalLabel">Create a new post</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <textarea class="form-control" rows="5"></textarea>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-success">Post</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                    Options
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><a class="dropdown-item" href="#">Logout</a></li>
                </ul>
            </div>
    </nav>

    <input type="radio" name="view" id="grid3" checked>
    <input type="radio" name="view" id="grid1">

    <div class="view-switch">
        <label for="grid3" onclick="setGrid(3)"><i class="bi bi-layout-three-columns"></i></label>
        <label for="grid1" onclick="setGrid(1)"><i class="bi bi-square-fill"></i></label>
    </div>


    <div class="container mt-4">
        <div id="gallery" class="row g-4">

            <div class="col-md-4">
                <div class="card">
                    <div class="d-flex justify-content-between">
                    </div>
                    <img src="https://picsum.photos/600/400?1"
                        class="card-img-top img-click img-fluid rounded shadow-sm" data-bs-toggle="modal"
                        data-bs-target="#imageModal">
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/600/400?2"
                        class="card-img-top img-click img-fluid rounded shadow-sm" data-bs-toggle="modal"
                        data-bs-target="#imageModal">
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/600/400?3"
                        class="card-img-top img-click img-fluid rounded shadow-sm" data-bs-toggle="modal"
                        data-bs-target="#imageModal">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="imageModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <img id="modalImg" class="w-100">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app.js"></script>

</html>
